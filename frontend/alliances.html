<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alliances — StromgardeBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="static/stromgardebot.png">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand" onclick="location.href='/'">
    <span class="brand-icon">⚔</span>
    <span class="brand-text">STROMGARDEBOT</span>
  </div>
  <div class="nav-links">
    <a href="/market.html" class="nav-link">Market</a>
    <a href="/alliances.html" class="nav-link active">Alliances</a>
    <a href="/towns.html" class="nav-link">Towns</a>
    <a href="/map" class="nav-link">Map</a>
    <a href="/founders" class="nav-link">Founders</a>
    <a href="/territories" class="nav-link">War Room</a>
  </div>
</nav>

<div class="page-header page-header--alliances">
  <div class="page-header-inner">
    <h1 class="page-title"><span class="page-title-icon">⚔️</span> Alliances</h1>
    <p class="page-subtitle">Continental champions and power rankings</p>
  </div>
</div>

<div class="main-content">
  <!-- Champion pedestals: top alliance per category -->
  <div class="champions-section">
    <div class="champions-title">Continental Champions</div>
    <div id="allianceChampions" class="champions-grid">
      <div class="loading-state"><div class="spinner spinner--purple"></div><span>Loading…</span></div>
    </div>
  </div>

  <!-- Power rankings -->
  <div class="rankings-section">
    <div class="rankings-header">
      <div class="rankings-title">⚡ Power Rankings</div>
      <div class="search-wrap" style="max-width:260px">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="allianceSearch" class="search-input" placeholder="Search alliances…">
      </div>
    </div>
    <div id="allianceGrid" class="alliance-grid">
      <div class="loading-state"><div class="spinner spinner--purple"></div><span>Loading…</span></div>
    </div>
  </div>
</div>

<div id="allianceModal" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalAllianceName">—</div>
        <div class="modal-subtitle">Alliance Details</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<footer class="footer">
  StromgardeBot &nbsp;•&nbsp; Data from <a href="https://api.lokamc.com" target="_blank">Loka API</a>
</footer>

<script src="app.js"></script>
</body>
</html>
