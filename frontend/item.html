<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item — Loka Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand" onclick="location.href='/'">
    <span class="brand-icon">⛏</span>
    <span class="brand-text">LOKA MARKET</span>
  </div>
  <div class="nav-links">
    <a href="/" class="nav-link">← All Items</a>
  </div>
</nav>

<div class="stats-strip">
  <div class="stat-item">
    <span class="stat-label">Total Trades</span>
    <span class="stat-value" id="statTrades">—</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Unique Items</span>
    <span class="stat-value" id="statItems">—</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Active Traders</span>
    <span class="stat-value" id="statTraders">—</span>
  </div>
</div>

<div class="main-content">

  <!-- hero -->
  <div class="item-hero">
    <div class="item-hero-left">
      <img id="itemIcon" class="item-hero-icon" src="" alt="">
      <div>
        <div class="item-hero-name" id="itemName">Loading…</div>
        <div class="item-hero-price">
          <span id="itemPrice">—</span>
          <span class="badge zone" id="zoneBadge">—</span>
        </div>
      </div>
    </div>
    <div class="item-hero-stats">
      <div class="hero-stat">
        <span class="hero-stat-label">Fair Value</span>
        <span class="hero-stat-value" id="statFmv">—</span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-label">Zone Low</span>
        <span class="hero-stat-value" id="statZoneLow">—</span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-label">Zone High</span>
        <span class="hero-stat-value" id="statZoneHigh">—</span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-label">Total Trades</span>
        <span class="hero-stat-value" id="statVol">—</span>
      </div>
    </div>
  </div>

  <!-- fair value zone meter -->
  <div class="card zone-card">
    <div class="card-header">
      <span class="card-title">Fair Value Zone</span>
      <span class="card-subtitle" id="zoneOutliers"></span>
    </div>
    <div class="zone-body" id="zoneBody">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- recent trades -->
  <div class="card trades-card">
    <div class="card-header">
      <span class="card-title">Recent Trades</span>
      <span class="card-subtitle" id="tradesCount"></span>
    </div>
    <div class="table-wrap">
      <table class="trades-table">
        <thead>
          <tr>
            <th>Price</th>
            <th>Buyer</th>
          </tr>
        </thead>
        <tbody id="tradesBody"></tbody>
      </table>
    </div>
  </div>

</div>

<footer class="footer">
  Loka Market &nbsp;•&nbsp; Economy data from <a href="https://lokamc.com" target="_blank">LokaMinecraft</a>
</footer>

<script src="app.js"></script>
</body>
</html>
